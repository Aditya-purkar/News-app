kind: Deployment
apiVersion: apps/v1
metadata:
  name: news-svc
  namespace: newsera
  labels:
    app: news-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: news-svc
  template:
    metadata:
      labels:
        app: news-svc
    spec:
      containers:
        - name: news-svc
          image: adityapurkar/news-app-distributed-news-svc:13
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5002
              name: news-port
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          # FIX: corrected indentation — 'name' must be 2 spaces under 'configMapRef'/'secretRef'
          envFrom:
            - configMapRef:
                name: news-config
            - secretRef:
                name: news-secret
 
---
kind: Service
apiVersion: v1
metadata:
  name: news-svc
  namespace: newsera
  labels:
    app: news-svc
spec:
  ports:
    - port: 5002
      targetPort: 5002
      protocol: TCP
  selector:
    app: news-svc
 
---
kind: HorizontalPodAutoscaler
apiVersion: autoscaling/v2
metadata:
  name: news-svc-hpa
  namespace: newsera
spec:
  scaleTargetRef:
    kind: Deployment
    apiVersion: apps/v1
    name: news-svc
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
 