apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: newsera
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Aditya-purkar/News-app
    targetRevision: main
    path: k8s           
  destination:
    server: https://kubernetes.default.svc
    namespace: newsera
  syncPolicy:
    automated:
      prune: true       # removes resources deleted from git
      selfHeal: true    # reverts manual kubectl changes
    syncOptions: