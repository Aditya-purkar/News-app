apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: newsera
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: adityapurkar/news-app-distributed-api-gateway:latest
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            # 🔹 FIXED: Added explicit cluster namespace resolution strings
            - name: AUTH_SERVICE_URL
              value: "http://auth-svc.newsera.svc.cluster.local:5001"
            - name: NEWS_SERVICE_URL
              value: "http://news-svc.newsera.svc.cluster.local:5002"
            - name: AI_SERVICE_URL
              value: "http://ai-svc.newsera.svc.cluster.local:5003"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: newsera
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 5000
      protocol: TCP
  selector:
    app: api-gateway