apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: newsera-unified-ingress
  namespace: newsera
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # FIX: Ensure /api routes are evaluated before the catch-all /
    nginx.ingress.kubernetes.io/use-regex: "false"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # Rule 1: ALL /api/* traffic goes to the API Gateway (more specific — evaluated first)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
 
          # Rule 2: Everything else is the React SPA (catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 5173