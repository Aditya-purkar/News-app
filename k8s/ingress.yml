apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: newsera-unified-ingress
  namespace: newsera
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # 1. Route web interface assets to the Frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 5173

          # 2. Route ALL backend system calls to the Central API Gateway
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080