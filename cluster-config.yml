kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  apiServerAddress: "0.0.0.0"
  apiServerPort: 6443
kubeadmConfigPatches:  
- |
  kind: ClusterConfiguration
  apiServer:
    certSANs:
    - "172.31.44.27"
    - "127.0.0.1"
    - "localhost"
nodes:
 - role: control-plane
   image: kindest/node:v1.31.2
   extraPortMappings:
   - containerPort: 80
     hostPort: 8080
     protocol: TCP
    
   - containerPort: 443
     hostPort: 443
     protocol: TCP
     
   - containerPort: 30000
     hostPort: 8086
     protocol: TCP
     
   - containerPort: 32000
     hostPort: 9090
     protocol: TCP
   
   - containerPort: 30005
     hostPort: 8085  
     listenAddress: "0.0.0.0"


     
   

 - role: worker
   image: kindest/node:v1.31.2

 - role: worker
   image: kindest/node:v1.31.2


   